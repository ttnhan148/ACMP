<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ACMP Solo WebApp{% endblock %}</title>
    <meta name="description" content="Self-hosted YouTube Faceless Content Production Pipeline and Performance Dashboard.">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: {
                            50: '#fefbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                            800: '#92400e',
                            900: '#78350f',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="/static/css/custom.css">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10" integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC" crossorigin="anonymous"></script>
    <!-- Chart.js for analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block head %}{% endblock %}
</head>
<body class="h-full flex overflow-hidden">

    <!-- Sidebar Navigation -->
    <aside class="w-64 bg-[#0d121e]/80 border-r border-white/5 flex flex-col justify-between backdrop-blur-xl">
        <div class="flex flex-col">
            <!-- Brand Logotype -->
            <div class="px-6 py-8 flex items-center gap-3 border-b border-white/5">
                <div class="h-9 w-9 rounded-xl bg-gradient-to-tr from-gold-500 to-amber-600 flex items-center justify-center shadow-lg shadow-gold-500/20">
                    <i data-lucide="zap" class="h-5 w-5 text-slate-900 stroke-[2.5]"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-white leading-none">ACMP</h1>
                    <span class="text-xs text-slate-500 font-medium tracking-widest">SOLO WEBAPP</span>
                </div>
            </div>

            <!-- Links Group -->
            <nav class="mt-8 px-3 space-y-1">
                <a href="/dashboard" class="sidebar-link {% if page == 'dashboard' %}active{% endif %} flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-400">
                    <i data-lucide="layout-dashboard" class="h-5 w-5"></i>
                    Dashboard
                </a>
                <a href="/projects" class="sidebar-link {% if page == 'projects' %}active{% endif %} flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-400">
                    <i data-lucide="folder-kanban" class="h-5 w-5"></i>
                    Projects
                </a>
                <a href="/prompts" class="sidebar-link {% if page == 'prompts' %}active{% endif %} flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-400">
                    <i data-lucide="terminal" class="h-5 w-5"></i>
                    Prompts Library
                </a>
                <a href="/analytics" class="sidebar-link {% if page == 'analytics' %}active{% endif %} flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-400">
                    <i data-lucide="line-chart" class="h-5 w-5"></i>
                    Performance Analytics
                </a>
            </nav>
        </div>

        <!-- System Settings & Creator Profile -->
        <div class="p-4 border-t border-white/5 bg-[#080b13]/40">
            <a href="/settings" class="sidebar-link {% if page == 'settings' %}active{% endif %} flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-400 mb-2">
                <i data-lucide="settings" class="h-5 w-5"></i>
                Settings
            </a>
            <div class="flex items-center gap-3 px-2 py-2">
                <div class="h-8 w-8 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center font-bold text-xs text-gold-500 uppercase">
                    C
                </div>
                <div class="overflow-hidden">
                    <h4 class="text-xs font-semibold text-white truncate">Creator Channel</h4>
                    <p class="text-[10px] text-slate-500 uppercase tracking-wider">Solo Mode</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Workspace Area -->
    <main class="flex-1 flex flex-col overflow-hidden bg-[#07090e]">
        <!-- Top status bar -->
        <header class="h-16 border-b border-white/5 flex items-center justify-between px-8 bg-[#090d16]/30 backdrop-blur-md">
            <div class="flex items-center gap-2">
                <span class="h-2 w-2 rounded-full bg-green-500 animate-ping"></span>
                <span class="text-xs text-slate-400 font-medium tracking-wide uppercase">Pipeline Engine Active</span>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-xs text-slate-500 font-medium">Local Time: <span id="current-time"></span></span>
            </div>
        </header>

        <!-- Main content view container -->
        <div class="flex-1 overflow-y-auto px-8 py-8">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Lucide Icons Rendering -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
        
        // Update Time script
        function updateTime() {
            const timeEl = document.getElementById("current-time");
            if (timeEl) {
                const now = new Date();
                timeEl.innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            }
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Custom HTMX loader listening to step transitions
        document.body.addEventListener('htmx:afterOnLoad', function(evt) {
            // Re-render icons on HTMX updates
            lucide.createIcons();
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
